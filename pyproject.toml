[tool.ruff]
target-version = "py313"
line-length = 120

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "UP",
    "B",
    "A",
    "C4",
    "T20",
    "RET",
    "SIM",
    "ARG",
    "ERA",
    "PL",
    "RUF",
    "C90",
    "N",
    "ANN",
    "S",
    "BLE",
    "FBT",
]
ignore = [
    "PLR0913", # Too many arguments in function definition
    "PLR0915", # Too many statements
    "PLR0912", # Too many branches
    "PLR2004", # Magic value used in comparison
    "PLR0911", # Too many return statements
    "PLW1510", # subprocess.run without check
    "SIM105",  # try-except-pass to contextlib.suppress
    "E501",    # Line too long
    "W293",    # Blank line contains whitespace
    "PLC0415", # Local import of yaml
]

[tool.ruff.lint.per-file-ignores]
"dsc/package_inspector.py" = ["T201"]
"dsc/source_miner.py" = ["T201"]
"dsc/smoke_tracer.py" = ["T201"]
"dsc/deploy.py" = ["T201"]
"dsc/asset_synthesizer.py" = ["T201"]
"fibonacci.py" = ["T201"]
"orchestrator.py" = ["T201"]
"tests/**" = ["T201", "PT011", "PLC0415", "ARG002", "SIM117", "E501", "RUF059", "RUF001", "RUF002", "RUF003", "SIM105", "F841"]
"test_*" = ["T201", "PLC0415", "ARG002", "SIM117", "E501", "RUF059", "RUF001", "RUF002", "RUF003", "SIM105", "F841"]

[tool.mypy]
strict = true
files = ["."]
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_optional = true
strict_optional = true
ignore_missing_imports = true

exclude = [
    '^tests/step4_ollama_synthesizer/fixtures/.*$',
    '^tests/.*/generated/.*$',
]

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
disallow_incomplete_defs = false

[[tool.mypy.overrides]]
module = "test_mcp_server,test_orchestrator_api"
disallow_untyped_defs = false
disallow_incomplete_defs = false

[dependency-groups]
dev = [
    "mypy>=2.1.0",
]
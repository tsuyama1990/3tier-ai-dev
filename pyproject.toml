[tool.ruff]
target-version = "py313"
line-length = 120

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "A", "C4", "T20", "RET", "SIM", "ARG", "ERA", "PL", "RUF", "C90", "N", "ANN", "S", "BLE", "FBT"]
ignore = [
    "S101",    # Use of assert
    "BLE001",  # Do not catch blind exception
    "S110",    # try-except-pass
    "ANN001",  # missing-type-function-argument
    "ANN201",  # missing-return-type-undocumented-public-function
    "ANN202",  # missing-return-type-private-function
    "ANN204",  # missing-return-type-special-method
    "ANN401",  # any-type
    "T201",    # print
    "PLC0415", # import-outside-top-level
    "E501",    # line-too-long
    "PLR2004", # magic-value-comparison
    "S603",    # subprocess-without-shell-equals-true
    "S607",    # start-process-with-partial-path
    "PLW1510", # subprocess-run-without-check
    "FBT001",  # boolean-type-hint-positional-argument
    "FBT002",  # boolean-default-value-positional-argument
    "PLR0911", # too-many-return-statements
    "PLR0912", # too-many-branches
    "PLR0913", # too-many-arguments
    "PLR0915", # too-many-statements
    "S310",    # suspicious-url-open-usage
    "RUF001",  # ambiguous-unicode-character-string
    "RUF002",  # ambiguous-unicode-character-docstring
    "RUF003",  # ambiguous-unicode-character-comment
    "SIM105",  # suppressible-exception
    "S108",    # hardcoded-temp-file
    "ARG001",  # unused-function-argument
    "ARG002",  # unused-method-argument
    "RUF059",  # unused-unpacked-variable
    "UP036",   # outdated-version-block
    "C901",    # complex-structure (McCabe complexity)
    "F401",    # unused-import
    "PLR0402", # import-in-lieu-of-alias
    "PLW2901", # outer-with-variable-overwritten
    "RUF100",  # unused-noqa
    "W293",    # blank-line-with-whitespace
    "UP035",   # import-from-collections-abc
    "UP043",   # unnecessary-default-type-args
    "F841",    # unused-variable
    "I001",    # unsorted-imports
    "S112",    # try-except-continue
    "RUF005",  # collection-literal-concatenation
    "SIM102",  # collapsible-if
    "SIM103",  # needless-bool
    "SIM117",  # multiple-with-statements
    "ARG005",  # unused-lambda-argument
]

[tool.mypy]
files = ["."]
strict = true
ignore_missing_imports = true
disallow_any_generics = false
warn_return_any = false
warn_unused_ignores = false

[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = true

[dependency-groups]
dev = [
    "libcst>=1.8.6",
    "mypy>=2.1.0",
    "numpy>=2.5.0",
    "ruff>=0.15.19",
]

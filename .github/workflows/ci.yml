name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pyyaml pydantic requests mcp

      - name: Run Ruff Check
        run: ruff check .

      - name: Run Mypy
        run: mypy .

      - name: Run Pytest
        run: pytest --ignore=tests/step1_baseline --ignore=tests/step2_fake_api --ignore=tests/step3_stress --ignore=tests/step4_ollama_synthesizer

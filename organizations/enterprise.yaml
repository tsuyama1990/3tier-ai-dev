profile_name: "enterprise"
description: >-
  Full 7-role separation with multiple Workers and specialized Verifiers.
  INTEGRATION is handled by the Integrator Agent with global regression checks.
  Requires multiple agent implementations registered in AgentRegistry.
  Suitable for scenarios using different models per role.
mode: production

assignment:
  requirement_review: "challenge_agent"
  planning: "planner_agent"
  architecture: "architect_agent"
  specification: "spec_agent"
  implementation: ["worker_a", "worker_b"]
  verification: ["ruff_checker", "mypy_checker"]
  integration: "integrator"
